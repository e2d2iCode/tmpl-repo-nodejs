repository:
  - '*'

assets:
  - assets/*

build:
  - .dockerignore
  - package.json

chore:
  - .husky
  - .markdownlintignore
  - .prettierrc
  - .vscode/*
  - '*.env'

docs:
  - docs/*
  - _layouts/*
  - .fs-info
  - README
  - LICENSE
  - README.md
  - LICENSE.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - site.webmanifest

scripts:
  - scripts/*

src:
  - src/*

specs:
  - spec/*

github-templates:
  - .github/PULL_REQUEST_TEMPLATE.md
  - .github/ISSUE_TEMPLATE/*

github-config:
  - .github/*
  - .gitconfig
  - .gitattributes
  - .gitignore

configs:
  - .configs/*

public:
  - public/*
